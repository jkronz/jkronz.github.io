<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us · Dolphin Home Repair 🐬</title>
</head>
<body style="margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:linear-gradient(160deg,#e0f7fa 0%,#b2ebf2 50%,#80deea 100%); min-height:100vh; color:#04364a;">

  <div style="max-width:560px; margin:0 auto; padding:48px 20px;">

    <!-- Header -->
    <div style="text-align:center; margin-bottom:36px;">
      <div style="font-size:56px; line-height:1;">🐬</div>
      <h1 style="margin:12px 0 4px; font-size:30px; font-weight:700; color:#04364a;">Dolphin Home Repair</h1>
      <p style="margin:0; font-size:16px; color:#0b6e8f;">Making a splash in home repair 🌊 | 770-789-3487</p>
    </div>

    <!-- Card -->
    <div style="background:#ffffff; border-radius:20px; box-shadow:0 12px 32px rgba(4,54,74,0.15); padding:36px 32px;">
      <h2 style="margin:0 0 6px; font-size:22px; font-weight:700; color:#04364a;">Get in Touch 🐬</h2>
      <p style="margin:0 0 28px; font-size:15px; color:#5a7a86;">Tell us what needs fixing and we'll dive right in.</p>

      <form action="#">

        <label style="display:block; margin-bottom:6px; font-size:14px; font-weight:600; color:#04364a;">Name</label>
        <input type="text" name="name" required placeholder="Jane Doe"
          style="width:100%; box-sizing:border-box; padding:12px 14px; margin-bottom:20px; font-size:15px; border:1px solid #c5dfe6; border-radius:10px; background:#f7fcfd; outline:none;">

        <label style="display:block; margin-bottom:6px; font-size:14px; font-weight:600; color:#04364a;">Email</label>
        <input type="email" name="email" required placeholder="jane@example.com"
          style="width:100%; box-sizing:border-box; padding:12px 14px; margin-bottom:20px; font-size:15px; border:1px solid #c5dfe6; border-radius:10px; background:#f7fcfd; outline:none;">

        <label style="display:block; margin-bottom:6px; font-size:14px; font-weight:600; color:#04364a;">Phone Number</label>
        <input type="tel" name="phone" placeholder="(555) 123-4567"
          style="width:100%; box-sizing:border-box; padding:12px 14px; margin-bottom:20px; font-size:15px; border:1px solid #c5dfe6; border-radius:10px; background:#f7fcfd; outline:none;">

        <label style="display:block; margin-bottom:6px; font-size:14px; font-weight:600; color:#04364a;">Message</label>
        <textarea name="message" rows="5" required placeholder="How can we help with your home repair?"
          style="width:100%; box-sizing:border-box; padding:12px 14px; margin-bottom:24px; font-size:15px; border:1px solid #c5dfe6; border-radius:10px; background:#f7fcfd; outline:none; resize:vertical; font-family:inherit;"></textarea>

        <button type="submit"
          style="width:100%; padding:14px; font-size:16px; font-weight:700; color:#ffffff; background:linear-gradient(135deg,#0b6e8f,#04a3c9); border:none; border-radius:12px; cursor:pointer; box-shadow:0 6px 16px rgba(4,163,201,0.35);">
          Send Message 🐬
        </button>
      </form>

      <!-- Thank-you (hidden until submit) -->
      <div id="thanks" style="display:none; text-align:center; padding:20px 0;">
        <div style="font-size:48px;">🐬🎉</div>
        <h2 style="margin:12px 0 6px; color:#04364a;">Thanks for reaching out!</h2>
        <p style="margin:0; color:#5a7a86;">We'll be in touch faster than a dolphin swims.</p>
      </div>
    </div>

    <!-- Footer -->
    <p style="text-align:center; margin:28px 0 0; font-size:13px; color:#0b6e8f;">
      🐬 Dolphin Home Repair · Fast, friendly, and always afloat
    </p>

  </div>
  <script type="text/javascript" src="//cdn.callrail.com/companies/587817617/35be956ee6187caf32ea/12/swap.js"></script>
</body>
</html>
